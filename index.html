<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>セイレーン作戦 ENアルティメット</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;text-align:center;margin:20px;}
button{padding:6px 10px;margin:4px;}
.map-btn{background:#eee;}
.map-btn.active{background:#4CAF50;color:white;font-weight:bold;}
.box{margin:8px;}
.result{margin-top:8px;}
table{margin:10px auto;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:5px 8px;}
</style>
</head>
<body>

<h2>セイレーン作戦 ENアルティメット</h2>

<h3>▼ マップ選択</h3>
<div id="maps"></div>
<div>消費EN/周: <span id="mapEN">-</span>　
戦闘数: <span id="mapBattles">-</span></div>

<h3>▼ EN入力</h3>
周回前EN: <input type="number" id="beforeEN" value="0"><br>
周回後EN: <input type="number" id="afterEN" value="0"><br>
消費EN: <span id="usedEN">0</span>　
自然回復: <span id="recoveredEN">0</span>

<h3>▼ EN箱</h3>
<div class="box">水色(20)
<button onclick="changeBox('blue',-1)">-</button>
<span id="blue">0</span>
<button onclick="changeBox('blue',1)">+</button>
</div>
<div class="box">紫(50)
<button onclick="changeBox('purple',-1)">-</button>
<span id="purple">0</span>
<button onclick="changeBox('purple',1)">+</button>
</div>
<div class="box">金(100)
<button onclick="changeBox('gold',-1)">-</button>
<span id="gold">0</span>
<button onclick="changeBox('gold',1)">+</button>
</div>

<div>
箱獲得EN: <span id="gainedEN">0</span>　
今回収支: <span id="balance">0</span>
</div>

<button onclick="addSession()">累計に追加</button>
<button onclick="showGraph()">表示</button>

<h3>▼ 周回可能数</h3>
可能周回数: <span id="possibleRuns">0</span>　
総戦闘数: <span id="totalBattles">0</span>

<h3>▼ ログ履歴</h3>
<button onclick="clearLog()">履歴クリア</button>
<table>
<thead>
<tr>
<th>日時</th><th>消費</th><th>獲得</th><th>回復</th><th>収支</th>
</tr>
</thead>
<tbody id="logBody"></tbody>
</table>

<canvas id="chart" width="400" height="200"></canvas>

<script>
const maps={
1:{en:5,b:2},
2:{en:10,b:2},
3:{en:15,b:2},
4:{en:20,b:5},
5:{en:25,b:7},
6:{en:30,b:7}
};

let state=JSON.parse(localStorage.getItem("enUltimate"))||{
counts:{blue:0,purple:0,gold:0},
lastTime:null,
logs:[],
currentMap:null
};

function save(){localStorage.setItem("enUltimate",JSON.stringify(state));}

function createMaps(){
for(let i=1;i<=6;i++){
let btn=document.createElement("button");
btn.textContent="周回"+i;
btn.id="map"+i;
btn.className="map-btn";
btn.onclick=()=>selectMap(i);
mapsDiv.appendChild(btn);
}
}
createMaps();

function selectMap(i){
state.currentMap=i;
document.querySelectorAll(".map-btn").forEach(b=>b.classList.remove("active"));
document.getElementById("map"+i).classList.add("active");
mapEN.textContent=maps[i].en;
mapBattles.textContent=maps[i].b;
calculatePossible();
save();
}

function changeBox(c,v){
state.counts[c]+=v;
if(state.counts[c]<0) state.counts[c]=0;
document.getElementById(c).textContent=state.counts[c];
calculate();
save();
}

function calculate(){
let before=parseInt(beforeEN.value)||0;
let after=parseInt(afterEN.value)||0;
let used=Math.max(before-after,0);
usedEN.textContent=used;

let gained=state.counts.blue*20+state.counts.purple*50+state.counts.gold*100;
gainedEN.textContent=gained;
balance.textContent=gained-used;
}

function addSession(){
calculate();
let now=Date.now();
let recovered=0;
if(state.lastTime){
let diff=Math.floor((now-state.lastTime)/60000);
recovered=Math.floor(diff/10);
}
recoveredEN.textContent=recovered;

let log={
date:new Date().toLocaleString(),
used:parseInt(usedEN.textContent),
gained:parseInt(gainedEN.textContent),
recovered:recovered,
balance:parseInt(balance.textContent)
};

state.logs.push(log);
state.lastTime=now;
save();
renderLog();
}

function renderLog(){
logBody.innerHTML="";
state.logs.forEach(l=>{
let row=`<tr>
<td>${l.date}</td>
<td>${l.used}</td>
<td>${l.gained}</td>
<td>${l.recovered}</td>
<td>${l.balance}</td>
</tr>`;
logBody.innerHTML+=row;
});
}
renderLog();

function clearLog(){
state.logs=[];
save();
renderLog();
}

function calculatePossible(){
if(!state.currentMap)return;
let en=parseInt(beforeEN.value)||0;
let m=maps[state.currentMap];
let runs=Math.floor(en/m.en);
possibleRuns.textContent=runs;
totalBattles.textContent=runs*m.b;
}

beforeEN.addEventListener("input",calculatePossible);

let chart;
function showGraph(){
let labels=state.logs.map((_,i)=>i+1);
let usedData=state.logs.map(l=>l.used);
let gainedData=state.logs.map(l=>l.gained);

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"消費EN",data:usedData,borderColor:"red"},
{label:"獲得EN",data:gainedData,borderColor:"blue"}
]
}
});
}

if(state.currentMap)selectMap(state.currentMap);
for(let c in state.counts){
document.getElementById(c).textContent=state.counts[c];
}
</script>

</body>
</html>
