<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アズレンENトラッカー (周回＋箱計算)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #eceff1; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h3 { border-left: 5px solid #3498db; padding-left: 10px; margin-top: 0; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin: 8px 0; border: 1px solid #cfd8dc; border-radius: 6px; }
        button { padding: 10px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2980b9; }
        
        /* 箱ボタン用スタイル */
        .box-btn { width: 30%; margin: 1%; font-size: 0.9rem; }
        .box-blue { background: #3498db; }
        .box-purple { background: #9b59b6; }
        .box-gold { background: #f1c40f; color: #333; }

        .calc-result { background: #e8f4fd; padding: 15px; border-radius: 6px; margin-top: 10px; text-align: center; }
        .result-val { font-size: 1.5rem; color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⚓ アズレンENトラッカー</h2>

    <div class="grid">
        <div class="card">
            <h3>🏃 周回消費計算</h3>
            <label>周回前のEN</label>
            <input type="number" id="startEN" placeholder="例: 15000" oninput="calculateDiff()">
            <label>周回後のEN</label>
            <input type="number" id="endEN" placeholder="例: 13200" oninput="calculateDiff()">
            
            <div class="calc-result">
                今回消費：<span id="diffDisplay" class="result-val">0</span> EN<br>
                <button style="margin-top:10px; background:#27ae60; width:100%;" onclick="applyToSpent()">消費合計に加算</button>
            </div>
        </div>

        <div class="card">
            <h3>📦 獲得EN (箱計算)</h3>
            <p>タップして獲得したENを追加</p>
            <button class="box-btn box-blue" onclick="addBox(20)">青(+20)</button>
            <button class="box-btn box-purple" onclick="addBox(50)">紫(+50)</button>
            <button class="box-btn box-gold" onclick="addBox(100)">金(+100)</button>
            
            <div class="calc-result" style="background:#e8f8f5;">
                獲得合計：<span id="boxEarnedDisplay" class="result-val" style="color:#27ae60;">0</span> EN<br>
                <button style="margin-top:10px; background:#27ae60; width:100%;" onclick="applyToEarned()">獲得合計に加算</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📝 今日の合計記録</h3>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="date" id="dateInput">
            <input type="number" id="earnedInput" placeholder="本日の獲得合計">
            <input type="number" id="spentInput" placeholder="本日の消費合計">
            <button style="width: 200px; height:45px;" onclick="addLog()">保存</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 EN推移レポート</h3>
        <canvas id="enChart"></canvas>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('azur_en_data')) || { logs: [], goal: 0 };
        let currentBoxEarned = 0;

        // 周回計算ロジック
        function calculateDiff() {
            const start = parseInt(document.getElementById('startEN').value) || 0;
            const end = parseInt(document.getElementById('endEN').value) || 0;
            const diff = Math.max(0, start - end);
            document.getElementById('diffDisplay').innerText = diff;
        }

        // 箱追加ロジック (NEW!)
        function addBox(amount) {
            currentBoxEarned += amount;
            document.getElementById('boxEarnedDisplay').innerText = currentBoxEarned;
        }

        // 消費を合計に加算
        function applyToSpent() {
            const diff = parseInt(document.getElementById('diffDisplay').innerText) || 0;
            const spentInput = document.getElementById('spentInput');
            spentInput.value = (parseInt(spentInput.value) || 0) + diff;
            
            // 周回計算機をリセット
            document.getElementById('startEN').value = document.getElementById('endEN').value;
            document.getElementById('endEN').value = "";
            document.getElementById('diffDisplay').innerText = "0";
        }

        // 獲得を合計に加算 (NEW!)
        function applyToEarned() {
            const earnedInput = document.getElementById('earnedInput');
            earnedInput.value = (parseInt(earnedInput.value) || 0) + currentBoxEarned;
            
            // 箱計算機をリセット
            currentBoxEarned = 0;
            document.getElementById('boxEarnedDisplay').innerText = "0";
        }

        function addLog() {
            const date = document.getElementById('dateInput').value;
            if(!date) return alert("日付を選択してください");

            const entry = {
                date: date,
                earned: parseInt(document.getElementById('earnedInput').value) || 0,
                spent: parseInt(document.getElementById('spentInput').value) || 0
            };

            const existingIdx = db.logs.findIndex(l => l.date === date);
            if(existingIdx >= 0) db.logs[existingIdx] = entry;
            else db.logs.push(entry);

            db.logs.sort((a, b) => new Date(a.date) - new Date(b.date));
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('azur_en_data', JSON.stringify(db));
            updateUI();
        }

        let myChart;
        function updateUI() {
            const ctx = document.getElementById('enChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: db.logs.map(l => l.date),
                    datasets: [
                        { label: '獲得EN', data: db.logs.map(l => l.earned), borderColor: '#2ecc71', tension: 0.3 },
                        { label: '消費EN', data: db.logs.map(l => l.spent), borderColor: '#e74c3c', tension: 0.3 }
                    ]
                }
            });
        }

        document.getElementById('dateInput').valueAsDate = new Date();
        updateUI();
    </script>
</body>
</html>
